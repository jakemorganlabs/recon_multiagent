name: Tests + Schema Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recon
          POSTGRES_PASSWORD: recon
          POSTGRES_DB: recon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run migrate
        env:
          DATABASE_URL: postgresql://recon:recon@localhost:5432/recon
      - run: npm test
        env:
          DATABASE_URL: postgresql://recon:recon@localhost:5432/recon
      - run: npm run lint
