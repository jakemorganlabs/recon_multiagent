name: Eval Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recon
          POSTGRES_PASSWORD: recon
          POSTGRES_DB: recon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run migrate
        env:
          DATABASE_URL: postgresql://recon:recon@localhost:5432/recon
      - run: npm run eval:fixtures
      - run: npm run eval
        env:
          DATABASE_URL: postgresql://recon:recon@localhost:5432/recon
          DEEPINFRA_BASE_URL: ${{ secrets.DEEPINFRA_BASE_URL }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          MODEL_NAME: google/gemma-4-26B-A4B-it
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: evals/report.md
