version: "3.8"

# Metabase on the ops VPS
# Pinned to a current stable tag — bump deliberately.
# Binds 127.0.0.1:3000 only; never a public port.
#
# Access options (configurable by operator):
#   (a) SSH port-forward: ssh -L 3000:127.0.0.1:3000 <vps>
#   (b) Cloudflare Access-protected hostname (operator adds reverse proxy later)
#
# Env file: .env (not committed — operator creates from .env.example)

services:
  metabase:
    image: metabase/metabase:v0.52.4
    # pinned — bump deliberately after reviewing Metabase release notes
    container_name: recon_metabase
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${METABASE_DB_NAME:-metabase}
      - MB_DB_PORT=${METABASE_DB_PORT:-5432}
      - MB_DB_USER=${METABASE_DB_USER:-metabase}
      - MB_DB_PASS=${METABASE_DB_PASS}
      - MB_DB_HOST=${METABASE_DB_HOST}
      - MB_SITE_NAME=${METABASE_SITE_NAME:-Recon Intelligence}
      - MB_START_OF_WEEK=${METABASE_START_OF_WEEK:-sunday}
    volumes:
      - metabase-data:/metabase-data
    mem_limit: 2g
    memswap_limit: 2g
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  metabase-data:
    name: recon_metabase_data
